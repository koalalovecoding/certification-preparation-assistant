<svg width="100%" viewBox="0 0 680 570" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TAT Reasoning Agent — system architecture</title>
<desc>Hub-and-spoke multi-agent certification system with two user types, five specialist agents, and three IQ data layers.</desc>
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; }
  .ts  { font-size: 12px; font-weight: 400; }

  .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   text { fill: #0C447C; }
  .c-coral  rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  text { fill: #712B13; }
  .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   text { fill: #085041; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
  .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  text { fill: #633806; }

  svg > text.ts { fill: #5F5E5A; }
</style>
<defs>
  <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- USERS -->
<g class="c-blue">
  <rect x="40" y="28" width="110" height="40" rx="6" stroke-width="0.5"/>
  <text class="th" x="95" y="48" text-anchor="middle" dominant-baseline="central">Learners</text>
</g>
<g class="c-coral">
  <rect x="530" y="28" width="110" height="40" rx="6" stroke-width="0.5"/>
